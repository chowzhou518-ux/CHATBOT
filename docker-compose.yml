version: '3.8'

services:
  # ==================================================
  # 主应用服务
  # ==================================================
  chatbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: parking-chatbot
    ports:
      - "8000:8000"  # REST API
      - "8001:8001"  # MCP Server
    environment:
      # LLM Configuration
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-your_deepseek_api_key_here}
      - LLM_PROVIDER=deepseek
      - LLM_BASE_URL=https://api.deepseek.com
      - DEFAULT_MODEL=deepseek-chat
      - TEMPERATURE=0.7
      - MAX_TOKENS=1024

      # Database Configuration
      - DATABASE_URL=sqlite:////app/data/parking.db

      # Vector Database (Milvus)
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - COLLECTION_NAME=parking_knowledge

      # MCP Server Configuration
      - MCP_API_KEY=${MCP_API_KEY:-mcp_secret_key_123}
      - RESERVATION_FILE=/app/data/approved_reservations.txt
      - BACKUP_DIR=/app/data/backups
      - MAX_FILE_SIZE=10485760
      - ENABLE_BACKUP=true
      - REQUIRE_AUTH=false

      # Admin System Configuration
      - ADMIN_EMAIL=admin@example.com
      - ADMIN_API_KEY=${ADMIN_API_KEY:-admin_secret_key_123}

      # Logging
      - LOG_LEVEL=INFO
      - MAX_CONTEXT_LENGTH=10
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      milvus:
        condition: service_healthy
    networks:
      - parking-network
    restart: unless-stopped
    stdin_open: true
    tty: true

  # ==================================================
  # Milvus 向量数据库（可选，用于生产环境）
  # ==================================================
  milvus:
    image: milvusdb/milvus:v2.4.15
    container_name: parking-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
    volumes:
      - milvus-data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    networks:
      - parking-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # ==================================================
  # etcd (Milvus 依赖)
  # ==================================================
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: parking-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd-data:/etcd
    command:
      - etcd
      - -advertise-client-urls=http://127.0.0.1:2379
      - -listen-client-urls http://0.0.0.0:2379
      - -listen-peer-urls http://0.0.0.0:2380
      - -initial-advertise-peer-urls http://localhost:2380
      - -initial-cluster parking-etcd=http://localhost:2380
      - -initial-cluster-token parking-etcd-token
      - -initial-cluster-state new
    networks:
      - parking-network
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ==================================================
  # MinIO (Milvus 依赖)
  # ==================================================
  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: parking-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio-data:/minio_data
    command: minio server /minio_data
    networks:
      - parking-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ==================================================
  # Redis (可选，用于缓存)
  # ==================================================
  redis:
    image: redis:7-alpine
    container_name: parking-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - parking-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

# ==================================================
# 数据卷
# ==================================================
volumes:
  milvus-data:
  etcd-data:
  minio-data:
  redis-data:

# ==================================================
# 网络
# ==================================================
networks:
  parking-network:
    driver: bridge
